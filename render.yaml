services:
  - type: web
    name: benekeup-beauty
    env: static
    staticPublishPath: .
    buildCommand: echo "Site statique - aucun build requis"
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
